name: Install Pixel Avatar

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/install-pixel-avatar.yml"

permissions:
  contents: write

jobs:
  install-avatar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Write animated avatar
        shell: bash
        run: |
          mkdir -p assets
          echo '' | base64 --decode > assets/vanszas-avatar-readme.gif

      - name: Update Pixel Avatar section
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          replacement = '''## 🎮 Pixel Avatar

          <p align="center">
            <img src="assets/vanszas-avatar-readme.gif" alt="Vanszas Pixel Avatar" width="180" />
          </p>'''
          pattern = r'## 🎮 Pixel Avatar\n.*?(?=\n## 🙋‍♂️ About Me)'
          updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('Pixel Avatar section was not found exactly once.')
          path.write_text(updated, encoding='utf-8')
          PY

      - name: Commit avatar and README
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/vanszas-avatar-readme.gif
          git diff --cached --quiet && exit 0
          git commit -m "docs: use animated pixel avatar in profile README"
          git push
